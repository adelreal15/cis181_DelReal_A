<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Mad Tea-Party Order Form</title>
</head>
<body>

    <h1>A Mad Tea-Party</h1>
    <h2>Tea Party Supplies</h2>

    <table>
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Tea Cups with Saucers</td>
                <td>$35.99</td>
            </tr>
            <tr>
                <td>Tea Pot</td>
                <td>$28.99</td>
            </tr>
            <tr>
                <td>Serving Spoon Set</td>
                <td>$10.99</td>
            </tr>
            <tr>
                <td>Butter Dish</td>
                <td>$12.99</td>
            </tr>
            <tr>
                <td>Bread Knife</td>
                <td>$29.99</td>
            </tr>
        </tbody>
    </table>

    <h3>Order Form</h3>

    <form method="post" action="http://www.rebol.com/cgi-bin/test-cgi.cgi">
        
        <p>
            <label for="customer_name">Customer Name:</label>
            <input type="text" id="customer_name" name="customer_name">
        </p>
        
        <p>
            <label for="mailing_address">Mailing Address:</label>
            <input type="text" id="mailing_address" name="mailing_address">
        </p>
        
        <p>
            <label for="city">City:</label>
            <input type="text" id="city" name="city">
        </p>

        <p>
            <label for="state">State:</label>
            <select id="state" name="state">
                <option value="IL">IL</option>
                <option value="IN">IN</option>
                <option value="MI">MI</option>
                <option value="WI">WI</option>
            </select>
        </p>

        <p>Choose a shipping option:</p>
        <p>
            <input type="radio" id="standard" name="shipping" value="standard">
            <label for="standard">Standard shipping (3-4 days)</label><br>
            
            <input type="radio" id="rush" name="shipping" value="rush">
            <label for="rush">Rush shipping (2 days)</label><br>
            
            <input type="radio" id="overnight" name="shipping" value="overnight">
            <label for="overnight">Overnight shipping (1 day)</label>
        </p>

        <p>
            <label for="special_instructions">Special delivery instructions?</label><br>
            <textarea id="special_instructions" name="special_instructions" rows="4" cols="30"></textarea>
        </p>

        <p>
            <input type="checkbox" id="mailinglist" name="mailinglist" value="yes" checked>
            <label for="mailinglist">E-mail me about future promotions and sales</label>
        </p>

        <p>
            <input type="submit" value="Place Order">
        </p>

    </form>

</body>
</html>
